plugins {
    id 'java'
}

apply from: 'dependencies.gradle'

group = 'org.rusefi'
version = '0.11-SNAPSHOT'

allprojects {
    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'java-test-fixtures'
}

defaultTasks 'jar'

jar {
    manifest {
        attributes(
                'Main-Class': 'com.rusefi.can.ToolSelector'
        )
    }
}